트리거: 모든 코드 변경 후, 릴리스 전.

허용 작업 (비파괴 검증만)
- node --check 구문 검사, JSON 유효성 검사
- 로컬 서버(반드시 repo 루트에서 python3 -m http.server) + Chromium E2E
  (Playwright: require('/opt/node22/lib/node_modules/playwright'), executablePath '/opt/pw-browsers/chromium')
- 내부 링크·셀렉터 존재 검사

금지 작업: 운영 코드 수정, 실제 고객 발송·결제·배포.

핵심 회귀 시나리오
- 상담 폼 4단계 제출 → 완료 화면(전화/문자 버튼) 표시
- 디자인 선택 → 상담 폼 selectedDesign 반영 → 관리자 카드 표시
- 예상견적 완료 → 상담 폼 프리필(공간·평수·범위·예산)
- 관리자: 시드 → 승인 → 안내문 초안 → 복사(발송 기록 sentAt/sentVia)
- 현장 앱 딥링크 디코딩 검증 (leadId·selectedDesign·consent·source 포함)
- XSS 페이로드(name/memo에 <img onerror>) 주입 시 실행되지 않음
- 페이지 에러(pageerror) 0

최종 산출물: 명령 / 기대 / 실제 / pass·fail 로그. 실패는 출력 원문 그대로 보고한다.

## 공통 규칙 (전 에이전트)
- 같은 파일은 동시에 쓰기 에이전트 1명만 수정한다 (single-writer).
- 쓰기 작업 전, 관련 읽기 전용 리뷰어의 근거(리포트)를 먼저 확보한다.
- URL·로그·리포트에 고객 PII 원문(이름·전화번호·주소·메모)을 남기지 않는다. 전화번호는 뒷 4자리만 표기한다.
- 금액·계약·고객 발송·삭제·프로덕션 배포는 대표 승인 후에만 진행한다 (무승인 발송 0).
- 실제로 검증하지 않은 작업을 완료로 보고하지 않는다 (허위·과장 금지).
