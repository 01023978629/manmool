name: Deploy Contract Backend (Fly.io)

# 전자계약 서버 자동 배포.
#   * contract-backend 가 바뀌어 main 에 들어오면 자동 배포(수동 실행도 가능).
#   * FLY_API_TOKEN 시크릿이 없으면 조용히 건너뛴다(설정 전에는 실패 소음 없음).
# 사장님 1회 준비(README/ DEPLOY.md 참고):
#   1) fly 앱·볼륨 생성:  fly launch --no-deploy --name <앱이름> ; fly volumes create contract_data --size 1
#   2) 시크릿 주입:       fly secrets set CONTRACT_PEPPER=... ADMIN_TOKEN=... CORS_ORIGINS=https://01023978629.github.io
#   3) 배포 토큰 발급:    fly tokens create deploy   → 값을 GitHub 저장소 Secrets 에 FLY_API_TOKEN 으로 추가
# 이후엔 main 에 푸시할 때마다 이 워크플로가 자동 배포한다.

on:
  push:
    branches: [main]
    paths: ['contract-backend/**', '.github/workflows/deploy-contract.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-contract
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # FLY_API_TOKEN 미설정이면 배포를 건너뛴다(설정 전 실패 소음 방지).
      - name: Check Fly token
        id: gate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN 미설정 — 자동 배포를 건너뜁니다. DEPLOY.md 의 1회 준비를 마치면 활성화됩니다."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup flyctl
        if: steps.gate.outputs.skip == 'false'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: steps.gate.outputs.skip == 'false'
        working-directory: contract-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config fly.toml --dockerfile Dockerfile
